name: Build & Deploy ARPILF Website

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Download Tailwind CSS CLI standalone
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 tailwindcss

      - name: Build Tailwind CSS
        run: ./tailwindcss -i assets/css/main.css -o static/css/style.css --minify

      - name: Build Hugo
        run: hugo --minify

      - name: Validate HTML
        run: |
          pip install html5validator
          html5validator --root ./public --ignore-re ".*@layer.*" ".*@property.*" --log INFO

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json

      - name: Inject OAuth credentials
        run: |
          sed -i "s/YOUR_CLIENT_ID/${{ secrets.OAUTH_CLIENT_ID }}/" ./public/oauth/index.php
          sed -i "s/YOUR_CLIENT_SECRET/${{ secrets.OAUTH_CLIENT_SECRET }}/" ./public/oauth/index.php

      - name: Deploy via FTP
        if: success()
        env:
          FTP_USER: ${{ secrets.SFTP_USER }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_PATH: ${{ secrets.SFTP_PATH }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          cat > /tmp/lftp-deploy.sh << 'SCRIPT'
          set ssl:verify-certificate no
          set ftp:ssl-allow yes
          set ftp:ssl-protect-data yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:timeout 30
          SCRIPT
          echo "open ftp://${FTP_HOST}" >> /tmp/lftp-deploy.sh
          echo "user \"${FTP_USER}\" \"${FTP_PASS}\"" >> /tmp/lftp-deploy.sh
          echo "mirror --reverse --delete --verbose --parallel=4 ./public/ ${FTP_PATH}" >> /tmp/lftp-deploy.sh
          echo "bye" >> /tmp/lftp-deploy.sh
          lftp -f /tmp/lftp-deploy.sh
