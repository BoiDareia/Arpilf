<footer class="bg-primary text-white mt-auto">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <!-- Morada -->
      <div>
        <h3 class="text-accent font-semibold mb-2">Morada</h3>
        <p>{{ .Site.Params.morada }}</p>
      </div>

      <!-- Contactos -->
      <div>
        <h3 class="text-accent font-semibold mb-2">Contactos</h3>
        <p>
          <span aria-label="Telefone">Tel:</span>
          <a href="tel:{{ .Site.Params.telefone }}" class="hover:text-accent transition-colors duration-200">{{ .Site.Params.telefone }}</a>
        </p>
        <p>
          <span aria-label="Email">Email:</span>
          <a href="mailto:{{ .Site.Params.email }}" class="hover:text-accent transition-colors duration-200">{{ .Site.Params.email }}</a>
        </p>
      </div>

      <!-- Links úteis -->
      <div>
        <h3 class="text-accent font-semibold mb-2">Informação</h3>
        <a href="{{ "protecao-dados/" | relURL }}" class="hover:text-accent transition-colors duration-200">Política de Proteção de Dados</a>
      </div>
    </div>

    <div class="border-t border-white/20 mt-8 pt-4 text-center text-sm">
      <p>&copy; {{ now.Year }} ARPILF — Associação de Reformados, Pensionistas e Idosos. Todos os direitos reservados.</p>
    </div>
  </div>
</footer>
