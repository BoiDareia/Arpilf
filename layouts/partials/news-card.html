<article class="flex flex-col bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden group hover:shadow-lg transition-shadow duration-300">

  <!-- Image area with fallback -->
  {{ with .Params.image }}
  <a href="{{ $.Permalink }}" class="block w-full aspect-video relative overflow-hidden bg-primary">
    <img src="{{ strings.TrimLeft "/" . | relURL }}" alt="{{ $.Title }}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
      onerror="this.style.display='none'">
  </a>
  {{ else }}
  <a href="{{ $.Permalink }}" class="block w-full aspect-video bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center">
    <svg class="w-16 h-16 text-primary/20" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
    </svg>
  </a>
  {{ end }}

  <!-- Content -->
  <div class="p-6 flex flex-col flex-grow">
    <time datetime="{{ .Date.Format "2006-01-02" }}" class="text-sm text-gray-500 mb-2 flex items-center gap-1">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      {{ .Date.Format "2 January 2006" }}
    </time>

    <h3 class="text-xl font-bold text-primary mb-3 line-clamp-2">
      <a href="{{ .Permalink }}" class="hover:text-accent transition-colors duration-200">
        {{ .Title }}
      </a>
    </h3>

    {{ with .Description }}
    <p class="text-gray-600 mb-4 flex-grow line-clamp-3">{{ . }}</p>
    {{ end }}

    <a href="{{ .Permalink }}" class="text-primary font-semibold hover:text-accent transition-colors duration-200 mt-auto inline-flex items-center gap-1">
      Ler mais
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</article>
