<nav role="navigation" aria-label="Navegação principal" class="bg-primary text-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="{{ "/" | relURL }}" class="flex items-center space-x-2" aria-label="ARPILF — Página inicial">
        <img src="{{ "images/logo.svg" | relURL }}" alt="Logo ARPILF" class="h-10 w-auto" onerror="this.style.display='none'">
        <span class="text-xl font-bold text-accent">ARPILF</span>
      </a>

      <!-- Desktop menu -->
      <ul class="hidden md:flex items-center space-x-6">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" class="hover:text-accent transition-colors duration-200 {{ if $.IsMenuCurrent "main" . }}text-accent font-semibold{{ end }}">
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>

      <!-- Hamburger button (mobile) -->
      <button
        id="menu-toggle"
        type="button"
        class="md:hidden inline-flex items-center justify-center p-2 rounded-md hover:bg-primary/80 focus:outline-none focus:ring-2 focus:ring-accent"
        aria-label="Abrir menu de navegação"
        aria-expanded="false"
        aria-controls="mobile-menu"
      >
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path id="icon-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          <path id="icon-close" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden pb-4">
      <ul class="space-y-2">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" class="block px-3 py-2 rounded-md hover:bg-primary/80 hover:text-accent transition-colors duration-200 {{ if $.IsMenuCurrent "main" . }}text-accent font-semibold{{ end }}">
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </div>
  </div>
</nav>
