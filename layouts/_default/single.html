{{ define "main" }}
<article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-primary mb-4">{{ .Title }}</h1>
    {{ with .Date }}
      {{ if not (eq .Year 1) }}
      <time datetime="{{ .Format "2006-01-02" }}" class="text-sm text-gray-600">
        {{ .Format "2 January 2006" }}
      </time>
      {{ end }}
    {{ end }}
    {{ with .Description }}
    <p class="mt-2 text-lg text-gray-600">{{ . }}</p>
    {{ end }}
  </header>

  <div class="prose prose-lg max-w-none">
    {{ .Content }}
  </div>
</article>
{{ end }}
